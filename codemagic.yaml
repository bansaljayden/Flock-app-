# Codemagic CI/CD — builds the Capacitor-wrapped Flock web app into a signed iOS .ipa
# and ships it to TestFlight. Runs entirely in the cloud (no Mac needed).
#
# Capacitor 8 uses Swift Package Manager — there is NO CocoaPods / .xcworkspace.
# We archive frontend/ios/App/App.xcodeproj using the shared "App" scheme.
#
# ─────────────────────────────────────────────────────────────────────────────
# ONE-TIME SETUP IN THE CODEMAGIC UI BEFORE THE FIRST BUILD:
#
# 1. App Store Connect API key integration
#    Codemagic UI → Teams → Integrations → App Store Connect → add a key
#    (created in App Store Connect → Users and Access → Integrations).
#    Name the integration exactly:  FlockASC   (matches `app_store_connect` below).
#
# 2. Web build secrets — create a variable group named  flock_web  and add EVERY
#    REACT_APP_* line from frontend/.env as Secure variables. Critical ones:
#      REACT_APP_MAPTILER_KEY          (no map renders without it)
#      REACT_APP_API_URL               (optional; defaults to the Railway prod URL)
#      REACT_APP_FIREBASE_* / REACT_APP_GOOGLE_* / REACT_APP_GOOGLE_MAPS_API_KEY
#    CRA inlines these at `npm run build`, so they must exist in the build env.
#
# 3. Create the app record in App Store Connect (My Apps → +) with bundle id
#    com.flockcorp.flock so TestFlight submission has somewhere to land.
# ─────────────────────────────────────────────────────────────────────────────

workflows:
  ios-capacitor:
    name: Flock iOS (Capacitor)
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: frontend
    integrations:
      app_store_connect: FlockASC
    environment:
      groups:
        - flock_web
      vars:
        BUNDLE_ID: "com.flockcorp.flock"
        APP_STORE_APP_ID: "6781442127"   # numeric ASC app id (Flock Social) — for build-number lookup
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        PUBLIC_URL: "."   # CRA → relative asset paths for the bundled WebView origin
        CI: "false"        # don't treat CRA build warnings as errors
      node: 22             # Capacitor 8.4 CLI requires Node >= 22
      xcode: latest
    scripts:
      - name: Install web dependencies
        script: npm install --no-audit --no-fund
      - name: Build web app (relative asset paths)
        script: npm run build
      - name: Capacitor sync iOS
        script: npx cap sync ios
      - name: Set up code signing (reuse pinned cert + App Store profile)
        script: |
          keychain initialize
          # Use a PINNED private key (CM_CERTIFICATE_PRIVATE_KEY env var) so every build
          # reuses ONE distribution certificate instead of minting a new one each run
          # (Apple caps distribution certs at 3). First run creates the cert from this key;
          # later runs find and reuse it because the key matches.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CM_CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Set unique build number (TestFlight rejects duplicates)
        script: |
          # App Store Connect rejects any upload whose CFBundleVersion was used before
          # ("bundle version must be higher than the previously uploaded version").
          # The project ships pinned at CURRENT_PROJECT_VERSION = 1, so every build after
          # the first 409s at Publishing. Fix: ask ASC for the highest build number it
          # has already seen and stamp the next integer above it — bulletproof regardless
          # of Codemagic's internal counter. MARKETING_VERSION (1.0) is left untouched.
          # Auth comes from the FlockASC integration env vars already in scope.
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" --platform IOS 2>/dev/null || true)
          case "$LATEST" in ''|*[!0-9]*) LATEST=0;; esac
          NEXT=$((LATEST + 1))
          # If Codemagic's monotonic build counter is somehow higher, prefer it.
          if [ "${BUILD_NUMBER:-0}" -gt "$NEXT" ] 2>/dev/null; then NEXT=$BUILD_NUMBER; fi
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9][0-9]*;/CURRENT_PROJECT_VERSION = $NEXT;/g" ios/App/App.xcodeproj/project.pbxproj
          echo "Stamped CURRENT_PROJECT_VERSION = $NEXT (ASC latest: $LATEST, CM build: ${BUILD_NUMBER:-n/a})"
          grep -n "CURRENT_PROJECT_VERSION" ios/App/App.xcodeproj/project.pbxproj
      - name: Build signed IPA
        script: >
          xcode-project build-ipa
          --project "$XCODE_PROJECT"
          --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - "**/*.ipa"
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
